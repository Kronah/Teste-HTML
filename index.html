<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leitor de Código de Barras (Mobile)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; max-width: 520px; margin-inline: auto; }
    #reader { width: 100%; border: 1px solid #ddd; border-radius: 10px; overflow: hidden; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 12px; border: 0; border-radius: 8px; font-weight: 700; color: #fff; }
    #start { background: #2563eb; }
    #stop { background: #dc2626; }
    .box { margin-top: 12px; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; }
    #status { font-weight: 700; color: #a16207; }
    #result { word-break: break-all; font-size: 1.05rem; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>Leitor de Código de Barras (Teste no Celular)</h2>

  <div id="reader"></div>

  <div class="row">
    <button id="start">Iniciar câmera</button>
    <button id="stop">Parar</button>
  </div>

  <div class="box">
    <div>Status: <span id="status">Aguardando...</span></div>
    <div>Resultado: <div id="result">—</div></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script>
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const btnStart = document.getElementById("start");
    const btnStop = document.getElementById("stop");

    let scanner = null;
    let running = false;
    let lastCode = "";

    function setStatus(msg, ok = false) {
      statusEl.textContent = msg;
      statusEl.style.color = ok ? "#15803d" : "#a16207";
    }

    async function startScanner() {
      if (running) return;

      try {
        setStatus("Solicitando câmera...");
        scanner = new Html5Qrcode("reader");

        // Tenta abrir câmera traseira no celular
        const cameraConfig = { facingMode: "environment" };

        const config = {
          fps: 10,
          rememberLastUsedCamera: true,
          // Barra (retângulo mais “horizontal” ajuda barcode)
          qrbox: (vw, vh) => {
            const w = Math.floor(Math.min(vw, 320));
            const h = Math.floor(w * 0.45);
            return { width: w, height: h };
          },
          formatsToSupport: [
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.ITF
          ]
        };

        await scanner.start(
          cameraConfig,
          config,
          (decodedText) => {
            if (decodedText !== lastCode) {
              lastCode = decodedText;
              resultEl.textContent = decodedText;
              setStatus("Código detectado ✅", true);
              if (navigator.vibrate) navigator.vibrate(120);
            }
          },
          () => { /* ignora erros de frame sem código */ }
        );

        running = true;
        setStatus("Lendo código...");
      } catch (err) {
        setStatus("Erro ao abrir câmera: " + (err?.message || err));
      }
    }

    async function stopScanner() {
      if (!scanner || !running) return;
      await scanner.stop();
      await scanner.clear();
      running = false;
      setStatus("Leitura parada.");
    }

    btnStart.addEventListener("click", startScanner);
    btnStop.addEventListener("click", stopScanner);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopScanner();
    });
  </script>
</body>
</html>
