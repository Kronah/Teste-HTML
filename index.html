<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Leitor de Código de Barras (Celular)</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --ok: #22c55e;
      --warn: #f59e0b;
      --btn: #2563eb;
      --btn2: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: rgba(17,24,39,.85);
      border: 1px solid rgba(148,163,184,.2);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(6px);
    }

    h1 {
      font-size: 1.1rem;
      margin: 0 0 10px;
      text-align: center;
    }

    .video-wrap {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,.25);
      background: #000;
    }

    video {
      width: 100%;
      display: block;
      aspect-ratio: 3/4; /* melhor para celular */
      object-fit: cover;
      background: #000;
    }

    .scan-line {
      position: absolute;
      left: 10%;
      right: 10%;
      top: 50%;
      height: 2px;
      background: rgba(34,197,94,.9);
      box-shadow: 0 0 8px rgba(34,197,94,.8);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: translateY(-60px); opacity: .35; }
      50% { transform: translateY(60px); opacity: 1; }
      100% { transform: translateY(-60px); opacity: .35; }
    }

    .controls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
    }

    #btnStart { background: var(--btn); }
    #btnStop { background: var(--btn2); }

    .box {
      margin-top: 12px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(2,6,23,.6);
      border: 1px solid rgba(148,163,184,.25);
    }

    .label { color: var(--muted); font-size: .9rem; }
    #status { font-weight: 700; color: var(--warn); }
    #result {
      margin-top: 6px;
      font-size: 1.05rem;
      word-break: break-all;
      font-weight: 700;
      color: var(--text);
    }

    .ok { color: var(--ok) !important; }
  </style>
</head>
<body>
  <main class="app">
    <h1>Leitor de Código de Barras (Teste no Celular)</h1>

    <div class="video-wrap">
      <video id="video" autoplay muted playsinline></video>
      <div class="scan-line"></div>
    </div>

    <div class="controls">
      <button id="btnStart">Iniciar</button>
      <button id="btnStop">Parar</button>
    </div>

    <div class="box">
      <div class="label">Status</div>
      <div id="status">Aguardando...</div>
      <div class="label" style="margin-top:8px;">Resultado</div>
      <div id="result">—</div>
    </div>
  </main>

  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script>
    const video = document.getElementById("video");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    const codeReader = new ZXing.BrowserMultiFormatReader();
    let started = false;
    let lastRead = "";

    async function iniciar() {
      if (started) return;
      started = true;

      statusEl.textContent = "Iniciando câmera traseira...";
      statusEl.classList.remove("ok");
      resultEl.textContent = "—";
      lastRead = "";

      try {
        // Mobile first: força preferência por câmera traseira
        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };

        statusEl.textContent = "Lendo código...";
        codeReader.decodeFromConstraints(constraints, video, (result, err) => {
          if (result) {
            const texto = result.getText?.() || result.text || "";
            if (texto && texto !== lastRead) {
              lastRead = texto;
              resultEl.textContent = texto;
              statusEl.textContent = "Código detectado ✅";
              statusEl.classList.add("ok");
              if (navigator.vibrate) navigator.vibrate(120);
            }
          }

          if (err && !(err instanceof ZXing.NotFoundException)) {
            statusEl.textContent = "Erro: " + (err.message || err);
            statusEl.classList.remove("ok");
          }
        });
      } catch (e) {
        started = false;
        statusEl.textContent = "Falha ao iniciar: " + e.message;
        statusEl.classList.remove("ok");
      }
    }

    function parar() {
      codeReader.reset();
      started = false;
      statusEl.textContent = "Leitura parada.";
      statusEl.classList.remove("ok");
    }

    btnStart.addEventListener("click", iniciar);
    btnStop.addEventListener("click", parar);

    // Para câmera ao sair da aba
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) parar();
    });
  </script>
</body>
</html>
