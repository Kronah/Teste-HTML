<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leitor de Código de Barras (Mobile)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      max-width: 560px;
      margin-inline: auto;
    }

    #reader-wrap {
      position: relative;
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    #reader {
      width: 100%;
      min-height: 360px;
    }

    /* Janela visual de leitura (maior) */
    .scan-window {
      position: absolute;
      left: 4%;
      top: 25%;
      width: 92%;
      height: 50%;
      border: 2px solid rgba(34, 197, 94, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.18) inset;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s ease;
    }

    /* Linha central piscando */
    .scan-line {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 50%;
      height: 2px;
      background: rgba(34, 197, 94, 0.95);
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: .25; }
      50% { opacity: 1; }
    }

    #reader-wrap.scanning .scan-window,
    #reader-wrap.scanning .scan-line {
      opacity: 1;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      font-weight: 700;
      color: #fff;
    }

    #start { background: #2563eb; }
    #stop  { background: #dc2626; }

    .box {
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    #status { font-weight: 700; color: #a16207; }
    #result { word-break: break-all; font-size: 1.05rem; margin-top: 6px; }
  </style>
</head>
<body>
  <h2>Leitor de Código de Barras (Teste no Celular)</h2>

  <div id="reader-wrap">
    <div id="reader"></div>
    <div class="scan-window"></div>
    <div class="scan-line"></div>
  </div>

  <div class="row">
    <button id="start">Iniciar câmera</button>
    <button id="stop">Parar</button>
  </div>

  <div class="box">
    <div>Status: <span id="status">Aguardando...</span></div>
    <div>Resultado: <div id="result">—</div></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script>
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const btnStart = document.getElementById("start");
    const btnStop = document.getElementById("stop");
    const readerWrap = document.getElementById("reader-wrap");

    let scanner = null;
    let running = false;
    let lastCode = "";

    function setStatus(msg, ok = false) {
      statusEl.textContent = msg;
      statusEl.style.color = ok ? "#15803d" : "#a16207";
    }

    async function startScanner() {
      if (running) return;

      try {
        setStatus("Solicitando câmera...");
        scanner = new Html5Qrcode("reader");

        const cameraConfig = { facingMode: "environment" };

        const config = {
          fps: 12,
          rememberLastUsedCamera: true,
          // Campo de detecção maior (quase tela toda, em formato de barras)
          qrbox: (vw, vh) => {
            const width = Math.floor(Math.min(vw * 0.92, 500));
            const height = Math.floor(Math.min(vh * 0.50, 260));
            return { width, height };
          },
          formatsToSupport: [
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.ITF
          ]
        };

        await scanner.start(
          cameraConfig,
          config,
          (decodedText) => {
            if (decodedText !== lastCode) {
              lastCode = decodedText;
              resultEl.textContent = decodedText;
              setStatus("Código detectado ✅", true);
              if (navigator.vibrate) navigator.vibrate(120);
            }
          },
          () => {}
        );

        running = true;
        readerWrap.classList.add("scanning");
        setStatus("Lendo código...");
      } catch (err) {
        setStatus("Erro ao abrir câmera: " + (err?.message || err));
      }
    }

    async function stopScanner() {
      if (!scanner || !running) return;
      await scanner.stop();
      await scanner.clear();
      running = false;
      readerWrap.classList.remove("scanning");
      setStatus("Leitura parada.");
    }

    btnStart.addEventListener("click", startScanner);
    btnStop.addEventListener("click", stopScanner);

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopScanner();
    });
  </script>
</body>
</html>
